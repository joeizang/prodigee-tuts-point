          - swift-cli-output-contracts
        exercises:
          - parse-output-format-swift
        sourceReferences:
          - book: the-swift-programming-language
            chapter: Enumerations and Error Handling
            topic: output format enums and typed unsupported-value errors
            usage: QualityAnchor
          - book: server-side-swift-vapor
            chapter: Application Structure
            topic: adapters that keep process or framework details outside reusable logic
