id: swift
title: Swift and Server-Side Swift
slug: swift
description: Project-backed mastery of Swift and server-side Swift through SwiftPM packages, command boundaries, async workflows, HTTP handlers, Vapor services, persistence, concurrency, and operational design.
language: Swift
contentVersion: 2026.06.19
concepts:
  - id: swift-value-modeling
    title: Swift Value Modeling
    description: Using structs, enums, optionals, and explicit initializers to represent trustworthy application data.
  - id: swift-command-boundaries
    title: Swift Command Boundaries
    description: Converting raw command-style input into typed Swift request values before core logic executes.
  - id: swiftpm-package-structure
    title: SwiftPM Package Structure
    description: Organizing exercise code as a real Swift package with library targets and XCTest targets.
  - id: swift-cli-contracts
    title: Swift CLI Contracts
    description: Defining command output formats, controlled parse failures, and process-independent command behavior.
  - id: swift-file-input
    title: Swift File Input Boundaries
    description: Modeling stdin and file input with explicit async reader contracts.
  - id: swift-async-streaming
    title: Swift Async Streaming
    description: Processing line streams incrementally with AsyncSequence and bounded deterministic summaries.
  - id: swift-cli-composition
    title: Swift CLI Composition
    description: Composing typed command requests, injected side effects, streaming cores, and edge renderers into a real command pipeline.
  - id: swift-http-adapters
    title: Swift HTTP Adapters
    description: Translating HTTP-shaped request data into reusable command-core inputs and stable response values.
  - id: swift-server-hardening
    title: Swift Server Hardening
    description: Applying validation, timeout mapping, body-size limits, and telemetry contracts around server request adapters.
  - id: swift-string-contracts
    title: Swift String Contracts
    description: Defining exact promises for nil, whitespace, separators, casing, and deterministic token output.
  - id: swift-text-normalization
    title: Swift Text Normalization
    description: Turning raw user text into stable tokens while naming Unicode and locale boundaries deliberately.
  - id: engineering-core-invariants
    title: Engineering Core Invariants
    description: Explaining the invariant that makes a parser, tokenizer, or transformation correct across edge cases.
  - id: swift-access-control
    title: Swift Access Control
    description: Designing public package APIs deliberately while keeping implementation details internal.
  - id: swift-protocol-boundaries
    title: Swift Protocol Boundaries
    description: Using protocols to express small replaceable behavior without hiding simple code behind abstractions.
  - id: swift-package-api-design
    title: Swift Package API Design
    description: Shaping reusable Swift package surfaces that future CLI, Vapor, and test adapters can depend on.
  - id: swift-vapor-routing
    title: Swift Vapor Routing
    description: Registering real Vapor routes that keep transport concerns at the server edge.
  - id: swift-vapor-route-testing
    title: Swift Vapor Route Testing
    description: Verifying Vapor endpoints with XCTVapor so HTTP status, query validation, body decoding, and JSON responses are tested through the framework.
  - id: swift-framework-dependency-workspaces
    title: Swift Framework Dependency Workspaces
    description: Using SwiftPM package dependencies deliberately for server-side exercises without slowing every language-core exercise.
modules:
  - id: swift-foundation-core
    title: Swift Foundation Core
    description: Build the typed package and command boundary that later CLI, async, HTTP, and Vapor milestones will reuse.
    order: 1
  - id: swift-cli-core
    title: Swift CLI Core
    description: Add output contracts and process-independent command behavior around the typed parser.
    order: 2
  - id: swift-file-io
    title: Swift File I/O
    description: Resolve stdin and file input through async boundaries before streaming work begins.
    order: 3
  - id: swift-streaming-core
    title: Swift Streaming Core
    description: Count log levels from async line streams with bounded deterministic output.
    order: 4
  - id: swift-command-composition
    title: Swift Command Composition
    description: Compose parsing, input, streaming, and rendering into a reusable process-independent command.
    order: 5
  - id: swift-server-adapters
    title: Swift Server Adapters
    description: Adapt HTTP and future Vapor request boundaries onto the reusable command core.
    order: 6
  - id: swift-server-hardening
    title: Swift Server Hardening
    description: Harden server request boundaries with validation, limits, timeout mapping, and telemetry.
    order: 7
  - id: swift-textkit-core
    title: Swift TextKit Core
    description: Build the first `textkit-swift` milestone around optionals, strings, deterministic tokenization, tests, and debugging-friendly contracts.
    order: 8
  - id: swift-packagecraft-core
    title: Swift PackageCraft Core
    description: Build package API boundaries with access control, protocols, deterministic behavior, tests, and future Vapor service reuse.
    order: 9
  - id: swift-vapor-runtime
    title: Swift Vapor Runtime
    description: Move from framework-shaped adapters into real Vapor routes, package dependencies, XCTVapor tests, and production server boundaries.
    order: 10
lessons:
