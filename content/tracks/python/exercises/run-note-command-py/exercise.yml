id: run-note-command-py
title: RunNoteCommand
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/run-note-command-py/note_cli.py
  entryPoint: run_note_command
  visibleTest: |
    import json
    from pathlib import Path

    from note_cli import run_note_command


    def write_notes(path: Path) -> None:
        path.write_text(
            json.dumps(
                [
                    {"title": "learn python", "body": "Practice daily", "tags": ["python", "cli"]},
                    {"title": "learn fastapi", "body": "Build routes", "tags": ["python", "api"]},
                ]
            ),
            encoding="utf-8",
        )


    def test_list_renders_all_notes(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"
        write_notes(notes_path)

        assert run_note_command(["list"], notes_path) == (
            "1. learn python [python, cli]\n"
            "2. learn fastapi [python, api]"
        )


    def test_search_by_tag_renders_matching_notes(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"
        write_notes(notes_path)

        assert run_note_command(["search", "--tag", "api"], notes_path) == "1. learn fastapi [python, api]"


    def test_update_changes_existing_note_body(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"
        write_notes(notes_path)

        message = run_note_command(
            ["update", "--title", " Learn Python ", "--body", "Practice with pytest"],
            notes_path,
        )

        assert message == "Updated note: learn python"
        assert json.loads(notes_path.read_text(encoding="utf-8"))[0]["body"] == "Practice with pytest"
