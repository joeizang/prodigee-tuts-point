id: integrate-sqlite-notes-api-py
title: IntegrateSqliteNotesApi
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/integrate-sqlite-notes-api-py/sqlite_api.py
  entryPoint: create_app
  visibleTest: |
    from pathlib import Path

    from fastapi.testclient import TestClient

    from sqlite_api import create_app


    def test_sqlite_backed_api_persists_between_requests(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.db"))

        assert client.post("/notes", json={"title": "Python", "body": "one", "tags": ["sqlite"]}).status_code == 201
        assert client.get("/notes").json() == [{"title": "python", "body": "one", "tags": ["sqlite"]}]


    def test_update_and_delete_use_sqlite_repository(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.db"))
        client.post("/notes", json={"title": "Python", "body": "old", "tags": []})

        updated = client.patch("/notes/python", json={"body": "new"})
        deleted = client.delete("/notes/python")

        assert updated.json() == {"title": "python", "body": "new", "tags": []}
        assert deleted.status_code == 204
        assert client.get("/notes").json() == []
  hiddenTest: |
    from pathlib import Path

    from fastapi.testclient import TestClient

    from sqlite_api import create_app, get_notes_service


    def test_duplicate_returns_conflict(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.db"))
        client.post("/notes", json={"title": "Python", "body": "one", "tags": []})

        response = client.post("/notes", json={"title": " python ", "body": "two", "tags": []})

        assert response.status_code == 409
        assert response.json()["detail"] == "note already exists: python"


    def test_dependency_override_bypasses_sqlite_file(tmp_path: Path) -> None:
        app = create_app(tmp_path / "notes.db")

        class FakeService:
            def list_notes(self) -> list[dict[str, object]]:
                return [{"title": "fake", "body": "body", "tags": []}]

            def create_note(self, title: str, body: str, tags: list[str]) -> dict[str, object]:
                return {"title": title, "body": body, "tags": tags}

            def update_note(self, title: str, body: str) -> dict[str, object]:
                return {"title": title, "body": body, "tags": []}

            def delete_note(self, title: str) -> None:
                return None

        app.dependency_overrides[get_notes_service] = lambda: FakeService()
        client = TestClient(app)

        assert client.get("/notes").json() == [{"title": "fake", "body": "body", "tags": []}]
        assert not (tmp_path / "notes.db").exists()
hints:
  - id: conceptual
    level: conceptual
    title: SQLite is selected in dependencies
    body: The route handler should receive a service, not construct a SQLite repository directly.
  - id: api-approach
    level: api-approach
    title: Preserve HTTP semantics
    body: Duplicate creates should still map to 409, missing records to 404, and deletes to 204.
  - id: structural
    level: structural
    title: Export the provider
    body: Hidden tests override get_notes_service, so it must be a top-level importable function.
solution:
  title: Model solution
  body: The solution wires SqliteNoteRepository through a FastAPI dependency provider and keeps route handlers focused on HTTP translation.
  code: |
    import sqlite3
    from pathlib import Path
    from typing import Annotated

    from fastapi import Depends, FastAPI, HTTPException, Request, Response, status
    from pydantic import BaseModel, Field


    class NoteCreate(BaseModel):
        title: str = Field(min_length=1)
        body: str = Field(min_length=1)
        tags: list[str] = Field(default_factory=list)


    class NoteUpdate(BaseModel):
        body: str = Field(min_length=1)


    class SqliteNoteRepository:
        def __init__(self, path: Path) -> None:
            self.path = path
            self.initialize()

        def initialize(self) -> None:
            self.path.parent.mkdir(parents=True, exist_ok=True)
            with sqlite3.connect(self.path) as connection:
                connection.execute(
                    "CREATE TABLE IF NOT EXISTS notes (title TEXT PRIMARY KEY, body TEXT NOT NULL, tags TEXT NOT NULL)"
                )

        def list_notes(self) -> list[dict[str, object]]:
            with sqlite3.connect(self.path) as connection:
                rows = connection.execute("SELECT title, body, tags FROM notes ORDER BY title").fetchall()
            return [{"title": row[0], "body": row[1], "tags": row[2].split(",") if row[2] else []} for row in rows]

        def add_note(self, note: dict[str, object]) -> None:
            tags = note["tags"]
            if not isinstance(tags, list) or not all(isinstance(tag, str) for tag in tags):
                raise ValueError("note tags must be a list of strings")
            try:
                with sqlite3.connect(self.path) as connection:
                    connection.execute(
                        "INSERT INTO notes (title, body, tags) VALUES (?, ?, ?)",
                        (note["title"], note["body"], ",".join(tags)),
                    )
            except sqlite3.IntegrityError as error:
                raise ValueError(f"note already exists: {note['title']}") from error

        def update_note(self, title: str, body: str) -> dict[str, object]:
            with sqlite3.connect(self.path) as connection:
                cursor = connection.execute("UPDATE notes SET body = ? WHERE title = ?", (body, title))
                if cursor.rowcount == 0:
                    raise LookupError(f"note not found: {title}")
            note = self.get_note(title)
            assert note is not None
            return note

        def delete_note(self, title: str) -> None:
            with sqlite3.connect(self.path) as connection:
                cursor = connection.execute("DELETE FROM notes WHERE title = ?", (title,))
                if cursor.rowcount == 0:
                    raise LookupError(f"note not found: {title}")

        def get_note(self, title: str) -> dict[str, object] | None:
            with sqlite3.connect(self.path) as connection:
                row = connection.execute("SELECT title, body, tags FROM notes WHERE title = ?", (title,)).fetchone()
            return None if row is None else {"title": row[0], "body": row[1], "tags": row[2].split(",") if row[2] else []}


    class NotesService:
        def __init__(self, repository: SqliteNoteRepository) -> None:
            self.repository = repository

        def list_notes(self) -> list[dict[str, object]]:
            return self.repository.list_notes()

        def create_note(self, title: str, body: str, tags: list[str]) -> dict[str, object]:
            note = {"title": normalize_title(title), "body": body.strip(), "tags": [tag.strip().lower() for tag in tags if tag.strip()]}
            self.repository.add_note(note)
            return note

        def update_note(self, title: str, body: str) -> dict[str, object]:
            return self.repository.update_note(normalize_title(title), body.strip())

        def delete_note(self, title: str) -> None:
            self.repository.delete_note(normalize_title(title))


    def get_notes_service(request: Request) -> NotesService:
        return NotesService(SqliteNoteRepository(request.app.state.database_path))


    def create_app(database_path: Path) -> FastAPI:
        app = FastAPI()
        app.state.database_path = database_path

        @app.get("/notes")
        def list_notes(service: Annotated[NotesService, Depends(get_notes_service)]) -> list[dict[str, object]]:
            return service.list_notes()

        @app.post("/notes", status_code=201)
        def create_note(request: NoteCreate, service: Annotated[NotesService, Depends(get_notes_service)]) -> dict[str, object]:
            try:
                return service.create_note(request.title, request.body, request.tags)
            except ValueError as error:
                raise HTTPException(status_code=409, detail=str(error)) from error

        @app.patch("/notes/{title}")
        def update_note(title: str, request: NoteUpdate, service: Annotated[NotesService, Depends(get_notes_service)]) -> dict[str, object]:
            try:
                return service.update_note(title, request.body)
            except LookupError as error:
                raise HTTPException(status_code=404, detail=str(error)) from error

        @app.delete("/notes/{title}", status_code=status.HTTP_204_NO_CONTENT)
        def delete_note(title: str, service: Annotated[NotesService, Depends(get_notes_service)]) -> Response:
            try:
                service.delete_note(title)
                return Response(status_code=status.HTTP_204_NO_CONTENT)
            except LookupError as error:
                raise HTTPException(status_code=404, detail=str(error)) from error

        return app


    def normalize_title(value: str) -> str:
        return " ".join(value.split()).lower()
commonWrongApproaches:
  - Instantiating SqliteNoteRepository inside each route.
  - Removing dependency overrides after adding SQLite.
  - Returning sqlite3 rows directly.
  - Mapping duplicate creates to 500.
expectedSolutionCharacteristics:
  - Exposes create_app and get_notes_service.
  - Uses SQLite through a repository.
  - Preserves dependency override behavior.
  - Keeps route handlers focused on HTTP semantics.
