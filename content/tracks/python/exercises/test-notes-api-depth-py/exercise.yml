    def test_dependency_override_exercises_http_boundary(tmp_path: Path) -> None:
        app = create_app(tmp_path / "notes.json")
        app.dependency_overrides[get_notes_service] = lambda: FakeService()
        client = TestClient(app)

        response = client.get("/notes")

        assert response.status_code == 200
        assert response.json() == [{"title": "fake", "body": "override", "tags": ["test"]}]
        assert not (tmp_path / "notes.json").exists()


    def test_structural_and_semantic_validation_are_distinct(tmp_path: Path) -> None:
        client = make_test_client(tmp_path / "notes.json")

        structural = client.post("/notes", json={"title": "Missing body"})
        semantic = client.post("/notes", json={"title": "Bad", "body": "body", "tags": ["machine learning"]})

        assert structural.status_code == 422
        assert semantic.status_code == 400
        assert semantic.json()["detail"] == "tags cannot contain spaces"


    def test_delete_contract_is_204_empty_body(tmp_path: Path) -> None:
        client = make_test_client(tmp_path / "notes.json")
        client.post("/notes", json={"title": "Python", "body": "body", "tags": []})

        response = client.delete("/notes/python")

        assert response.status_code == 204
        assert response.content == b""
