  entryPoint: create_app
  visibleTest: |
    from pathlib import Path

    from notes_api_testing import make_test_client


    def test_make_test_client_uses_isolated_storage(tmp_path: Path) -> None:
        first = make_test_client(tmp_path / "first.json")
        second = make_test_client(tmp_path / "second.json")

        first.post("/notes", json={"title": "Python", "body": "one", "tags": []})

        assert first.get("/notes").json() == [{"title": "python", "body": "one", "tags": []}]
        assert second.get("/notes").json() == []


    def test_conflict_and_missing_paths_are_covered(tmp_path: Path) -> None:
        client = make_test_client(tmp_path / "notes.json")
        client.post("/notes", json={"title": "Python", "body": "one", "tags": []})

        duplicate = client.post("/notes", json={"title": " python ", "body": "two", "tags": []})
        missing = client.patch("/notes/missing", json={"body": "new"})

        assert duplicate.status_code == 409
        assert duplicate.json()["detail"] == "note already exists: python"
        assert missing.status_code == 404
        assert missing.json()["detail"] == "note not found: missing"
