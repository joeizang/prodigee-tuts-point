id: plan-alembic-revision-py
title: PlanAlembicRevision
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/plan-alembic-revision-py/alembic_plan.py
  entryPoint: build_revision_plan
  visibleTest: |
    from alembic_plan import build_revision_plan


    def test_revision_plan_has_metadata_upgrade_and_downgrade() -> None:
        plan = build_revision_plan("20260620_01", "20260619_02")

        assert plan["revision"] == "20260620_01"
        assert plan["down_revision"] == "20260619_02"
        assert "op.add_column('notes', 'archived')" in plan["upgrade"]
        assert "op.drop_column('notes', 'archived')" in plan["downgrade"]


    def test_revision_plan_includes_review_and_tests() -> None:
        plan = build_revision_plan("rev", None)

        assert "data_preserved" in plan["review_checks"]
        assert "fresh_database_upgrade" in plan["test_plan"]
  hiddenTest: |
    from alembic_plan import build_revision_plan


    def test_revision_avoids_unreviewed_destructive_operations() -> None:
        plan = build_revision_plan("rev", "base")

        assert not any("drop_table" in operation for operation in plan["upgrade"])
        assert plan["risk_level"] == "low"
        assert plan["requires_manual_review"] is True


    def test_revision_has_stable_slug() -> None:
        plan = build_revision_plan("20260620_01", "base")

        assert plan["slug"] == "add-note-archived-search-index"
hints:
  - id: conceptual
    level: conceptual
    title: Migration files are reviewed source
    body: The plan should include review checks and tests, not only upgrade operations.
  - id: api-approach
    level: api-approach
    title: Include downgrade deliberately
    body: Even if production downgrade is restricted, the migration should document reversal behavior.
  - id: structural
    level: structural
    title: Flag destructive changes
    body: The first Alembic plans should reject unreviewed destructive operations such as drop_table.
solution:
  title: Model solution
  body: The model solution returns an Alembic-style revision plan with metadata, upgrade, downgrade, review checks, and migration tests.
  code: |
    def build_revision_plan(revision_id: str, down_revision: str | None) -> dict[str, object]:
        return {
            "revision": revision_id,
            "down_revision": down_revision,
            "slug": "add-note-archived-search-index",
            "risk_level": "low",
            "requires_manual_review": True,
            "upgrade": [
                "op.add_column('notes', 'archived')",
                "op.create_index('ix_notes_archived', 'notes', ['archived'])",
                "op.create_index('ix_notes_title', 'notes', ['title'])",
            ],
            "downgrade": [
                "op.drop_index('ix_notes_title', table_name='notes')",
                "op.drop_index('ix_notes_archived', table_name='notes')",
                "op.drop_column('notes', 'archived')",
            ],
            "review_checks": [
                "data_preserved",
                "no_unreviewed_drop_table",
                "indexes_named_explicitly",
                "downgrade_documented",
            ],
            "test_plan": [
                "fresh_database_upgrade",
                "existing_database_upgrade_preserves_rows",
                "downgrade_removes_added_objects",
            ],
        }
commonWrongApproaches:
  - Trusting autogenerated migrations without review.
  - Omitting downgrade behavior entirely.
  - Mixing destructive operations into upgrade casually.
  - Skipping migration test planning.
expectedSolutionCharacteristics:
  - Includes revision and down revision metadata.
  - Defines upgrade and downgrade operations.
  - Flags manual review requirements.
  - Includes migration test expectations.
  - Avoids unreviewed destructive upgrade operations.
