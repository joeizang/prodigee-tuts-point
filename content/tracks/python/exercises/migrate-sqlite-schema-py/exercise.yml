  visibleTest: |
    import sqlite3
    from pathlib import Path

    from sqlite_migrations import TARGET_SCHEMA_VERSION, migrate, verify_schema


    def test_migrate_fresh_database_reaches_target_version(tmp_path: Path) -> None:
        path = tmp_path / "notes.db"

        assert migrate(path) == TARGET_SCHEMA_VERSION
        verify_schema(path)

        with sqlite3.connect(path) as connection:
            columns = [row[1] for row in connection.execute("PRAGMA table_info(notes)").fetchall()]

        assert columns == ["title", "body", "tags", "archived"]


    def test_migration_is_idempotent(tmp_path: Path) -> None:
        path = tmp_path / "notes.db"

        assert migrate(path) == 2
        assert migrate(path) == 2
  hiddenTest: |
    import sqlite3
    from pathlib import Path

    import pytest

    from sqlite_migrations import migrate, verify_schema


    def test_existing_v1_database_is_upgraded_without_losing_rows(tmp_path: Path) -> None:
        path = tmp_path / "notes.db"
        with sqlite3.connect(path) as connection:
            connection.execute("CREATE TABLE schema_version (version INTEGER NOT NULL)")
            connection.execute("INSERT INTO schema_version (version) VALUES (1)")
            connection.execute("CREATE TABLE notes (title TEXT PRIMARY KEY, body TEXT NOT NULL, tags TEXT NOT NULL)")
            connection.execute("INSERT INTO notes (title, body, tags) VALUES ('python', 'body', '[]')")

        migrate(path)

        with sqlite3.connect(path) as connection:
            row = connection.execute("SELECT title, archived FROM notes").fetchone()

        assert row == ("python", 0)


    def test_verify_schema_rejects_old_database(tmp_path: Path) -> None:
        path = tmp_path / "old.db"
        with sqlite3.connect(path) as connection:
            connection.execute("CREATE TABLE schema_version (version INTEGER NOT NULL)")
            connection.execute("INSERT INTO schema_version (version) VALUES (1)")

        with pytest.raises(RuntimeError, match="schema version"):
            verify_schema(path)
