solution:
  title: Model solution
  body: The model solution applies two idempotent SQLite migrations and verifies the target schema version at startup.
  code: |
    import sqlite3
    from pathlib import Path


    TARGET_SCHEMA_VERSION = 2


    def migrate(database_path: Path) -> int:
        database_path.parent.mkdir(parents=True, exist_ok=True)
        with sqlite3.connect(database_path) as connection:
            ensure_version_table(connection)
            version = current_version(connection)
            if version < 1:
                connection.execute(
                    "CREATE TABLE IF NOT EXISTS notes (title TEXT PRIMARY KEY, body TEXT NOT NULL, tags TEXT NOT NULL)"
                )
                set_version(connection, 1)
                version = 1
            if version < 2:
                columns = [row[1] for row in connection.execute("PRAGMA table_info(notes)").fetchall()]
                if "archived" not in columns:
                    connection.execute("ALTER TABLE notes ADD COLUMN archived INTEGER NOT NULL DEFAULT 0")
                set_version(connection, 2)
                version = 2
        return version


    def verify_schema(database_path: Path) -> None:
        with sqlite3.connect(database_path) as connection:
            version = current_version(connection)
            if version != TARGET_SCHEMA_VERSION:
                raise RuntimeError(f"schema version {version} does not match expected {TARGET_SCHEMA_VERSION}")
            columns = [row[1] for row in connection.execute("PRAGMA table_info(notes)").fetchall()]
            if columns != ["title", "body", "tags", "archived"]:
                raise RuntimeError("notes schema is not current")


    def ensure_version_table(connection: sqlite3.Connection) -> None:
        connection.execute("CREATE TABLE IF NOT EXISTS schema_version (version INTEGER NOT NULL)")
        if connection.execute("SELECT COUNT(*) FROM schema_version").fetchone()[0] == 0:
            connection.execute("INSERT INTO schema_version (version) VALUES (0)")


    def current_version(connection: sqlite3.Connection) -> int:
        return int(connection.execute("SELECT version FROM schema_version").fetchone()[0])


    def set_version(connection: sqlite3.Connection, version: int) -> None:
        connection.execute("DELETE FROM schema_version")
        connection.execute("INSERT INTO schema_version (version) VALUES (?)", (version,))
commonWrongApproaches:
  - Creating tables without recording schema version.
  - Dropping existing note rows during upgrade.
  - Failing when migrations run twice.
  - Verifying only that the database file exists.
expectedSolutionCharacteristics:
  - Applies versioned migrations in order.
  - Preserves existing v1 rows.
  - Is safe to run repeatedly.
  - Verifies expected schema version.
  - Uses sqlite3 schema inspection.
