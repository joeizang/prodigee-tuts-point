id: run-add-command-py
title: RunAddCommand
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/run-add-command-py/note_runner.py
  entryPoint: run_add_command
  visibleTest: |
    import json
    from pathlib import Path

    from note_runner import run_add_command


    def test_add_command_creates_notes_file(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"

        message = run_add_command(
            ["--title", " Learn Python ", "--body", "Practice daily", "--tags", "python, cli"],
            notes_path,
        )

        assert message == "Added note: learn python"
        assert json.loads(notes_path.read_text(encoding="utf-8")) == [
            {"title": "learn python", "body": "Practice daily", "tags": ["python", "cli"]}
        ]


    def test_add_command_appends_to_existing_notes(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"
        notes_path.write_text(
            json.dumps([{"title": "existing", "body": "old", "tags": ["archive"]}]),
            encoding="utf-8",
        )

        run_add_command(["--title", "New Note", "--body", "new body"], notes_path)

        assert json.loads(notes_path.read_text(encoding="utf-8")) == [
            {"title": "existing", "body": "old", "tags": ["archive"]},
            {"title": "new note", "body": "new body", "tags": []},
        ]
  hiddenTest: |
    import json
    from pathlib import Path

    import pytest

    from note_runner import run_add_command


    def test_rejects_invalid_tag_before_writing(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"

        with pytest.raises(ValueError, match="spaces"):
            run_add_command(
                ["--title", "Bad Tags", "--body", "body", "--tags", "machine learning"],
                notes_path,
            )

        assert not notes_path.exists()


    def test_rejects_missing_body_before_writing(tmp_path: Path) -> None:
        notes_path = tmp_path / "notes.json"

        with pytest.raises(ValueError, match="--body"):
            run_add_command(["--title", "Missing Body"], notes_path)

        assert not notes_path.exists()


    def test_writes_deterministic_pretty_json_with_trailing_newline(tmp_path: Path) -> None:
        notes_path = tmp_path / "nested" / "notes.json"

        run_add_command(["--title", "Title", "--body", "Body", "--tags", "Python, python"], notes_path)

        assert notes_path.read_text(encoding="utf-8") == (
            '[\n'
            '  {\n'
            '    "body": "Body",\n'
            '    "tags": [\n'
            '      "python"\n'
            '    ],\n'
            '    "title": "title"\n'
            '  }\n'
            ']\n'
        )
hints:
  - id: conceptual
    level: conceptual
    title: Compose the workflow
    body: The runner should call small helper steps in order instead of becoming one giant parser-storage-renderer function.
  - id: api-approach
    level: api-approach
    title: Validate before saving
    body: Parse and validate the request, title, tags, and note record before writing the JSON file.
  - id: structural
    level: structural
    title: Save deterministic JSON
    body: Use json.dumps with indent=2 and sort_keys=True, then add one trailing newline for stable file output.
solution:
  title: Model solution
  body: The model solution keeps the runner readable by splitting parsing, normalization, record creation, loading, and saving into small helpers.
  code: |
    import json
    from pathlib import Path


    def run_add_command(args: list[str], notes_path: Path) -> str:
        request = parse_add_command(args)
        title = normalize_title(str(request["title"]))
        tags = parse_tags(str(request["tags"]))
        record = build_note_record(title, str(request["body"]), tags)
        notes = load_notes_or_empty(notes_path)
        notes.append(record)
        save_notes(notes_path, notes)
        return f"Added note: {title}"


    def parse_add_command(args: list[str]) -> dict[str, object]:
        title: str | None = None
        body: str | None = None
        tags = ""

        index = 0
        while index < len(args):
            option = args[index]
            if option not in {"--title", "--body", "--tags"}:
                raise ValueError(f"unknown option: {option}")

            index += 1
            if index >= len(args):
                raise ValueError(f"{option} requires a value")

            value = args[index]
            if option == "--title":
                title = value
            elif option == "--body":
                body = value
            else:
                tags = value

            index += 1

        if title is None:
            raise ValueError("--title is required")
        if body is None:
            raise ValueError("--body is required")

        return {"title": title, "body": body, "tags": tags}


    def normalize_title(raw_title: str) -> str:
        words = raw_title.split()
        if not words:
            raise ValueError("title is required")
        return " ".join(words).lower()


    def parse_tags(raw_tags: str) -> list[str]:
        tags: list[str] = []
        for chunk in raw_tags.split(","):
            tag = chunk.strip().lower()
            if not tag:
                continue
            if " " in tag:
                raise ValueError("tags cannot contain spaces")
            if tag in tags:
                continue
            tags.append(tag)
        return tags


    def build_note_record(title: str, body: str, tags: list[str]) -> dict[str, object]:
        clean_body = body.strip()
        if not clean_body:
            raise ValueError("body is required")
        return {"title": title, "body": clean_body, "tags": list(tags)}


    def load_notes_or_empty(path: Path) -> list[dict[str, object]]:
        if not path.exists():
            return []

        decoded = json.loads(path.read_text(encoding="utf-8"))
        if not isinstance(decoded, list):
            raise ValueError("notes file must contain a list")

        notes: list[dict[str, object]] = []
        for value in decoded:
            if not isinstance(value, dict):
                raise ValueError("each note must be an object")
            title = value.get("title")
            body = value.get("body")
            tags = value.get("tags")
            if not isinstance(title, str):
                raise ValueError("note title must be text")
            if not isinstance(body, str):
                raise ValueError("note body must be text")
            if not isinstance(tags, list) or not all(isinstance(tag, str) for tag in tags):
                raise ValueError("note tags must be a list of strings")
            notes.append({"title": title, "body": body, "tags": list(tags)})
        return notes


    def save_notes(path: Path, notes: list[dict[str, object]]) -> None:
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(json.dumps(notes, indent=2, sort_keys=True) + "\n", encoding="utf-8")
commonWrongApproaches:
  - Writing the file before parsing and validation have succeeded.
  - Re-reading sys.argv inside the runner.
  - Silently overwriting existing notes instead of appending.
  - Saving compact or nondeterministic JSON when the contract requires stable output.
  - Swallowing invalid tags and creating a note anyway.
expectedSolutionCharacteristics:
  - Creates missing parent directories for the notes file.
  - Treats a missing notes file as an empty list.
  - Appends to existing valid notes.
  - Writes sorted, indented JSON with one trailing newline.
  - Returns the exact added-note message.
