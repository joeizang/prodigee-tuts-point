id: verify-health-startup-py
title: VerifyHealthStartup
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/verify-health-startup-py/health_startup.py
  entryPoint: create_app
  visibleTest: |
    import pytest
    from fastapi.testclient import TestClient

    from health_startup import ReadinessChecks, create_app, startup_check


    def test_liveness_does_not_depend_on_database() -> None:
        client = TestClient(create_app(ReadinessChecks(database_ok=False, schema_version=0)))

        assert client.get("/health/live").json() == {"status": "alive"}


    def test_readiness_reports_dependency_failure_without_secrets() -> None:
        client = TestClient(
            create_app(
                ReadinessChecks(
                    database_ok=False,
                    schema_version=2,
                    database_url="postgresql+psycopg://user:secret@localhost/notes",
                )
            )
        )

        response = client.get("/health/ready")

        assert response.status_code == 503
        assert response.json()["status"] == "not_ready"
        assert response.json()["checks"]["database"] == "failed"
        assert "secret" not in str(response.json())


    def test_startup_check_fails_when_schema_is_old() -> None:
        with pytest.raises(RuntimeError, match="schema version"):
            startup_check(ReadinessChecks(database_ok=True, schema_version=1, expected_schema_version=2))
  hiddenTest: |
    from fastapi.testclient import TestClient

    from health_startup import ReadinessChecks, create_app, deployment_commands, startup_check


    def test_ready_response_and_startup_success() -> None:
        checks = ReadinessChecks(database_ok=True, schema_version=2, expected_schema_version=2)

        startup_check(checks)
        response = TestClient(create_app(checks)).get("/health/ready")

        assert response.status_code == 200
        assert response.json() == {
            "status": "ready",
            "checks": {"database": "ok", "schema": "ok"},
        }


    def test_deployment_commands_run_migrations_before_server_start() -> None:
        commands = deployment_commands()

        assert commands[0] == "uv run alembic upgrade head"
        assert commands[1] == "uv run uvicorn notes_api.main:create_app --factory"
        assert len(commands) == 2
hints:
  - id: conceptual
    level: conceptual
    title: Separate live from ready
    body: Liveness should prove the process responds, while readiness can inspect database and schema prerequisites.
  - id: api-approach
    level: api-approach
    title: Fail startup before traffic
    body: The same checks that drive readiness should stop production startup when schema or database requirements fail.
  - id: structural
    level: structural
    title: Migrations run before server
    body: Deployment commands should make Alembic upgrade happen before the ASGI server accepts requests.
solution:
  title: Model solution
  body: The model solution separates liveness and readiness, redacts database secrets, validates startup prerequisites, and documents migration-before-startup commands.
  code: |
    from dataclasses import dataclass

    from fastapi import FastAPI, status
    from fastapi.responses import JSONResponse
    from pydantic import BaseModel


    class HealthResponse(BaseModel):
        status: str


    class ReadinessResponse(BaseModel):
        status: str
        checks: dict[str, str]


    @dataclass(frozen=True)
    class ReadinessChecks:
        database_ok: bool = True
        schema_version: int = 2
        expected_schema_version: int = 2
        database_url: str = "sqlite:///tmp/notes.db"

        def run(self) -> ReadinessResponse:
            checks = {
                "database": "ok" if self.database_ok else "failed",
                "schema": "ok" if self.schema_version == self.expected_schema_version else "failed",
            }
            status_value = "ready" if all(value == "ok" for value in checks.values()) else "not_ready"
            return ReadinessResponse(status=status_value, checks=checks)


    def create_app(checks: ReadinessChecks | None = None) -> FastAPI:
        readiness_checks = checks or ReadinessChecks()
        app = FastAPI()

        @app.get("/health/live", response_model=HealthResponse)
        def live() -> HealthResponse:
            return HealthResponse(status="alive")

        @app.get("/health/ready", response_model=ReadinessResponse)
        def ready() -> ReadinessResponse | JSONResponse:
            result = readiness_checks.run()
            if result.status != "ready":
                return JSONResponse(
                    status_code=status.HTTP_503_SERVICE_UNAVAILABLE,
                    content=result.model_dump(),
                )
            return result

        return app


    def startup_check(checks: ReadinessChecks) -> None:
        if not checks.database_ok:
            raise RuntimeError("database readiness check failed")
        if checks.schema_version != checks.expected_schema_version:
            raise RuntimeError(
                f"schema version {checks.schema_version} does not match expected {checks.expected_schema_version}"
            )


    def deployment_commands() -> list[str]:
        return [
            "uv run alembic upgrade head",
            "uv run uvicorn notes_api.main:create_app --factory",
        ]
commonWrongApproaches:
  - Making liveness depend on the database.
  - Returning database credentials from health output.
  - Reporting ready with an old schema.
  - Starting the server before migrations run.
expectedSolutionCharacteristics:
  - Separates liveness from readiness.
  - Checks database and schema readiness.
  - Redacts sensitive database connection details.
  - Fails startup on unmet prerequisites.
  - Documents migration-before-startup deployment order.
