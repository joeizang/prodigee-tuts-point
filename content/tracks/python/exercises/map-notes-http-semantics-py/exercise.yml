  entryPoint: create_app
  visibleTest: |
    from pathlib import Path

    from fastapi.testclient import TestClient

    from notes_http import create_app


    def test_create_returns_201_and_duplicate_returns_409(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.json"))

        created = client.post("/notes", json={"title": "Python", "body": "one", "tags": ["python"]})
        duplicate = client.post("/notes", json={"title": " Python ", "body": "two", "tags": []})

        assert created.status_code == 201
        assert created.json() == {"title": "python", "body": "one", "tags": ["python"]}
        assert duplicate.status_code == 409
        assert duplicate.json()["detail"] == "note already exists: python"


    def test_delete_returns_204_with_no_body(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.json"))
        client.post("/notes", json={"title": "Python", "body": "one", "tags": []})

        response = client.delete("/notes/python")

        assert response.status_code == 204
        assert response.content == b""
  hiddenTest: |
    from pathlib import Path

    from fastapi.testclient import TestClient

    from notes_http import create_app


    def test_missing_update_returns_404(tmp_path: Path) -> None:
        client = TestClient(create_app(tmp_path / "notes.json"))

        response = client.patch("/notes/missing", json={"body": "new"})

        assert response.status_code == 404
