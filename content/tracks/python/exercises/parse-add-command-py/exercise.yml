id: parse-add-command-py
title: ParseAddCommand
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/parse-add-command-py/note_commands.py
  entryPoint: parse_add_command
  visibleTest: |
    from note_commands import parse_add_command


    def test_parses_required_title_and_body() -> None:
        assert parse_add_command(["--title", "Learn Python", "--body", "Practice daily"]) == {
            "title": "Learn Python",
            "body": "Practice daily",
            "tags": "",
        }


    def test_parses_optional_tags() -> None:
        assert parse_add_command(
            ["--title", "Learn Python", "--body", "Practice daily", "--tags", "python,practice"]
        ) == {
            "title": "Learn Python",
            "body": "Practice daily",
            "tags": "python,practice",
        }
  hiddenTest: |
    import pytest

    from note_commands import parse_add_command


    def test_allows_options_in_any_order() -> None:
        assert parse_add_command(["--body", "Body", "--tags", "python", "--title", "Title"]) == {
            "title": "Title",
            "body": "Body",
            "tags": "python",
        }


    def test_rejects_unknown_option() -> None:
        with pytest.raises(ValueError, match="unknown"):
            parse_add_command(["--title", "Title", "--body", "Body", "--priority", "high"])


    def test_rejects_missing_option_value() -> None:
        with pytest.raises(ValueError, match="--title"):
            parse_add_command(["--title"])


    def test_rejects_missing_required_body() -> None:
        with pytest.raises(ValueError, match="--body"):
            parse_add_command(["--title", "Title"])
hints:
  - id: conceptual
    level: conceptual
    title: Parse into a request
    body: The command line is outside data. Convert it into a request dictionary before any storage or note creation happens.
  - id: api-approach
    level: api-approach
    title: Walk option/value pairs
    body: Use an index loop so each recognized option can consume the following value and report a clear error when the value is missing.
  - id: structural
    level: structural
    title: Check required fields last
    body: Collect title, body, and tags first. After the loop, reject missing required options.
solution:
  title: Model solution
  body: The model solution walks raw command arguments, consumes supported option values, rejects unknown options, and returns a small request dictionary.
  code: |
    def parse_add_command(args: list[str]) -> dict[str, object]:
        title: str | None = None
        body: str | None = None
        tags = ""

        index = 0
        while index < len(args):
            option = args[index]

            if option not in {"--title", "--body", "--tags"}:
                raise ValueError(f"unknown option: {option}")

            index += 1
            if index >= len(args):
                raise ValueError(f"{option} requires a value")

            value = args[index]
            if option == "--title":
                title = value
            elif option == "--body":
                body = value
            else:
                tags = value

            index += 1

        if title is None:
            raise ValueError("--title is required")
        if body is None:
            raise ValueError("--body is required")

        return {"title": title, "body": body, "tags": tags}
commonWrongApproaches:
  - Reading sys.argv inside the function.
  - Silently ignoring unknown options.
  - Treating a missing option value as an empty string.
  - Requiring options to appear in only one order.
expectedSolutionCharacteristics:
  - Returns a dictionary with title, body, and tags keys.
  - Allows supported options in any order.
  - Raises ValueError for unknown options and missing values.
  - Does not read files, print, or inspect sys.argv.
