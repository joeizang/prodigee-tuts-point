  visibleTest: |
    from pathlib import Path

    from sqlite_repository import SqliteNoteRepository


    def test_sqlite_repository_adds_gets_and_lists_notes(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()

        repository.add_note({"title": "python", "body": "body", "tags": ["api", "sqlite"]})

        assert repository.get_note("python") == {"title": "python", "body": "body", "tags": ["api", "sqlite"]}
        assert repository.list_notes() == [{"title": "python", "body": "body", "tags": ["api", "sqlite"]}]


    def test_sqlite_repository_updates_and_deletes_notes(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()
        repository.add_note({"title": "python", "body": "old", "tags": []})

        updated = repository.update_note("python", {"body": "new", "tags": ["sqlite"]})
        repository.delete_note("python")

        assert updated == {"title": "python", "body": "new", "tags": ["sqlite"]}
        assert repository.list_notes() == []
  hiddenTest: |
    import sqlite3
    from pathlib import Path

    import pytest

    from sqlite_repository import SqliteNoteRepository


    def test_duplicate_title_raises_value_error(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()
        repository.add_note({"title": "python", "body": "one", "tags": []})

        with pytest.raises(ValueError, match="note already exists: python"):
            repository.add_note({"title": "python", "body": "two", "tags": []})


    def test_missing_update_and_delete_raise_lookup_error(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()

        with pytest.raises(LookupError, match="note not found: missing"):
            repository.update_note("missing", {"body": "new"})

        with pytest.raises(LookupError, match="note not found: missing"):
            repository.delete_note("missing")


    def test_uses_parameterized_queries_for_titles_with_quotes(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()
        title = "quote ' title"

        repository.add_note({"title": title, "body": "body", "tags": ["sql"]})

        assert repository.get_note(title) == {"title": title, "body": "body", "tags": ["sql"]}


    def test_schema_contains_primary_key_title(tmp_path: Path) -> None:
        repository = SqliteNoteRepository(tmp_path / "notes.db")
        repository.initialize()

        with sqlite3.connect(tmp_path / "notes.db") as connection:
            columns = connection.execute("PRAGMA table_info(notes)").fetchall()

        assert any(column[1] == "title" and column[5] == 1 for column in columns)
