solution:
  title: Model solution
  body: The model solution initializes a SQLite schema, stores tags as JSON text, maps rows into stable note dictionaries, and uses parameterized SQL for all values.
  code: |
    import json
    import sqlite3
    from pathlib import Path


    class SqliteNoteRepository:
        def __init__(self, path: Path) -> None:
            self.path = path

        def initialize(self) -> None:
            self.path.parent.mkdir(parents=True, exist_ok=True)
            with self.connect() as connection:
                connection.execute(
                    """
                    CREATE TABLE IF NOT EXISTS notes (
                        title TEXT PRIMARY KEY,
                        body TEXT NOT NULL,
                        tags TEXT NOT NULL
                    )
                    """
                )

        def list_notes(self) -> list[dict[str, object]]:
            with self.connect() as connection:
                rows = connection.execute(
                    "SELECT title, body, tags FROM notes ORDER BY title"
                ).fetchall()
            return [self.map_row(row) for row in rows]

        def get_note(self, title: str) -> dict[str, object] | None:
            with self.connect() as connection:
                row = connection.execute(
                    "SELECT title, body, tags FROM notes WHERE title = ?",
                    (title,),
                ).fetchone()
            return None if row is None else self.map_row(row)

        def add_note(self, note: dict[str, object]) -> None:
            try:
                with self.connect() as connection:
                    connection.execute(
                        "INSERT INTO notes (title, body, tags) VALUES (?, ?, ?)",
                        (note["title"], note["body"], json.dumps(note["tags"])),
                    )
            except sqlite3.IntegrityError as error:
                raise ValueError(f"note already exists: {note['title']}") from error

        def update_note(self, title: str, changes: dict[str, object]) -> dict[str, object]:
            current = self.get_note(title)
            if current is None:
                raise LookupError(f"note not found: {title}")

            updated = dict(current)
            updated.update(changes)
            with self.connect() as connection:
                connection.execute(
                    "UPDATE notes SET body = ?, tags = ? WHERE title = ?",
                    (updated["body"], json.dumps(updated["tags"]), title),
                )
            return updated

        def delete_note(self, title: str) -> None:
            with self.connect() as connection:
                cursor = connection.execute("DELETE FROM notes WHERE title = ?", (title,))
                if cursor.rowcount == 0:
                    raise LookupError(f"note not found: {title}")

        def connect(self) -> sqlite3.Connection:
            connection = sqlite3.connect(self.path)
            connection.row_factory = sqlite3.Row
            return connection

        @staticmethod
        def map_row(row: sqlite3.Row) -> dict[str, object]:
            return {
                "title": row["title"],
                "body": row["body"],
                "tags": json.loads(row["tags"]),
            }
commonWrongApproaches:
  - Building SQL with f-strings and user data.
  - Returning sqlite3.Row objects directly.
  - Forgetting to create the schema before operations.
  - Letting duplicate title errors leak as raw sqlite3.IntegrityError.
  - Changing the service-facing note dictionary shape.
expectedSolutionCharacteristics:
  - Creates a notes table with title as primary key.
  - Uses parameterized SQL for all user data.
  - Stores and loads tags deterministically.
  - Raises clear ValueError and LookupError exceptions.
  - Keeps SQLite details inside SqliteNoteRepository.
