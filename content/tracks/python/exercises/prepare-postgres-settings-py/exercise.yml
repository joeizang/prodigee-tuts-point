id: prepare-postgres-settings-py
title: PreparePostgresSettings
kind: focused
workspace:
  runtime: python-pytest
  starter: tracks/python/exercises/prepare-postgres-settings-py/postgres_readiness.py
  entryPoint: parse_database_url
  visibleTest: |
    from postgres_readiness import parse_database_url, portability_warnings


    def test_parse_postgresql_url() -> None:
        parsed = parse_database_url("postgresql+psycopg://user:secret@localhost:5432/notes")

        assert parsed == {
            "provider": "postgresql",
            "driver": "psycopg",
            "username": "user",
            "host": "localhost",
            "port": 5432,
            "database": "notes",
            "production_ready": True,
        }


    def test_parse_sqlite_url_for_dev_only() -> None:
        parsed = parse_database_url("sqlite:///tmp/notes.db")

        assert parsed["provider"] == "sqlite"
        assert parsed["production_ready"] is False


    def test_portability_warnings_detect_sqlite_assumptions() -> None:
        warnings = portability_warnings(["PRAGMA table_info(notes)", "archived INTEGER NOT NULL DEFAULT 0"])

        assert "SQLite PRAGMA is not PostgreSQL portable" in warnings
        assert "Use a real boolean column instead of INTEGER boolean flags" in warnings
  hiddenTest: |
    import pytest

    from postgres_readiness import parse_database_url, portability_warnings


    def test_invalid_or_incomplete_urls_are_rejected() -> None:
        with pytest.raises(ValueError, match="unsupported database provider"):
            parse_database_url("mysql://user@localhost/db")

        with pytest.raises(ValueError, match="database name is required"):
            parse_database_url("postgresql+psycopg://user:secret@localhost:5432")


    def test_postgres_readiness_flags_autoincrement_and_sqlite_placeholders() -> None:
        warnings = portability_warnings(["INTEGER PRIMARY KEY AUTOINCREMENT", "WHERE title = ?"])

        assert "SQLite autoincrement syntax is not PostgreSQL portable" in warnings
        assert "Use SQLAlchemy parameter binding instead of sqlite3 question placeholders" in warnings
