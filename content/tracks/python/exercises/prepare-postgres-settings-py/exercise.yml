solution:
  title: Model solution
  body: The model solution validates SQLite and PostgreSQL URLs and reports portability warnings for SQLite-specific SQL assumptions.
  code: |
    from urllib.parse import urlparse


    def parse_database_url(url: str) -> dict[str, object]:
        parsed = urlparse(url)
        if parsed.scheme == "sqlite":
            if not parsed.path:
                raise ValueError("database name is required")
            return {
                "provider": "sqlite",
                "driver": "sqlite3",
                "username": None,
                "host": None,
                "port": None,
                "database": parsed.path.lstrip("/"),
                "production_ready": False,
            }

        if parsed.scheme == "postgresql+psycopg":
            database = parsed.path.lstrip("/")
            if not database:
                raise ValueError("database name is required")
            return {
                "provider": "postgresql",
                "driver": "psycopg",
                "username": parsed.username,
                "host": parsed.hostname,
                "port": parsed.port,
                "database": database,
                "production_ready": True,
            }

        raise ValueError("unsupported database provider")


    def portability_warnings(sql_snippets: list[str]) -> list[str]:
        warnings: list[str] = []
        joined = "\n".join(sql_snippets).upper()
        if "PRAGMA" in joined:
            warnings.append("SQLite PRAGMA is not PostgreSQL portable")
        if "INTEGER PRIMARY KEY AUTOINCREMENT" in joined:
            warnings.append("SQLite autoincrement syntax is not PostgreSQL portable")
        if "ARCHIVED INTEGER" in joined or "DEFAULT 0" in joined:
            warnings.append("Use a real boolean column instead of INTEGER boolean flags")
        if "?" in joined:
            warnings.append("Use SQLAlchemy parameter binding instead of sqlite3 question placeholders")
        return warnings
commonWrongApproaches:
  - Treating PostgreSQL as a string replacement for SQLite.
  - Allowing production to use sqlite URLs silently.
  - Ignoring SQLite-specific SQL syntax.
  - Assuming SQLite tests prove PostgreSQL behavior.
expectedSolutionCharacteristics:
  - Parses PostgreSQL and SQLite URLs.
  - Rejects unsupported database providers.
  - Marks SQLite as not production-ready.
  - Detects common SQLite portability assumptions.
  - Prepares future SQLAlchemy/PostgreSQL integration tests.
