projects:
  - id: py-notes-cli
    title: py-notes-cli
    slug: py-notes-cli
    description: Build a small notes command-line tool while learning Python from first principles through tests, text contracts, JSON storage, and deterministic output.
    milestones:
      - id: py-notes-python-first-contact
        title: Python first contact
        summary: Learn Python syntax, names, functions, branches, exceptions, tests, lists, and dictionaries before the first real normalization boundary.
