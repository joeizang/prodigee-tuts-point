id: python
title: Python and FastAPI
slug: python
description: Beginner-to-proficient Python and FastAPI through methodical language foundations, pytest, real project workspaces, APIs, persistence, validation, and production design.
language: Python
contentVersion: 2026.06.20
concepts:
  - id: py-names-and-objects
    title: Names and Objects
    description: Understanding Python names as bindings to objects rather than boxes that contain values.
  - id: py-strings
    title: Text as Data
    description: Working with immutable strings, whitespace, casing, and explicit text contracts.
  - id: py-functions
    title: Functions and Return Values
    description: Writing small functions with clear inputs, outputs, exceptions, and type hints.
  - id: py-collections
    title: Lists and Collections
    description: Using lists to hold ordered values, remove empty data, and build deterministic outputs.
  - id: py-validation
    title: Validation Boundaries
    description: Separating outside text from trusted application data with explicit parsing and errors.
  - id: py-file-io
    title: File I/O Boundaries
    description: Reading and writing UTF-8 text with pathlib while keeping file effects outside pure core logic.
  - id: py-json-storage
    title: JSON Storage
    description: Converting Python dictionaries and lists to deterministic JSON and validating loaded records.
  - id: py-cli-boundaries
    title: CLI Command Boundaries
    description: Parsing command arguments and rendering command output without mixing UI concerns into core rules.
  - id: py-command-runner
    title: Command Runner Composition
    description: Composing parsing, validation, storage, and rendering helpers into one testable application workflow.
  - id: py-note-mutations
    title: Note Mutations and Queries
    description: Updating, deleting, listing, and searching stored records while preserving deterministic command behavior.
  - id: py-service-boundaries
    title: Service Boundaries
    description: Isolating reusable application operations so CLI commands and FastAPI routes can share the same core.
  - id: py-pytest-basics
    title: pytest Basics
    description: Using assertions and exception tests to turn beginner mental models into executable evidence.
  - id: py-editor-feedback
    title: Editor Feedback
    description: Using Pyright, Ruff, diagnostics, hover, and formatting as part of the learning loop.
  - id: fastapi-request-models
    title: FastAPI Request Models
    description: Connecting Python type hints and validation to FastAPI request bodies and response models.
  - id: fastapi-route-handlers
    title: FastAPI Route Handlers
    description: Writing thin HTTP adapters that call reusable Python service functions.
  - id: fastapi-dependencies
    title: FastAPI Dependencies
    description: Using Depends, app factories, and dependency overrides to keep route handlers decoupled and testable.
  - id: pydantic-contract-models
    title: Pydantic Contract Models
    description: Designing request, response, and error models with explicit validation and serialization rules.
  - id: http-semantics
    title: HTTP Semantics
    description: Choosing status codes, response bodies, and error categories deliberately instead of treating HTTP as generic function calls.
  - id: py-repository-boundaries
    title: Repository Boundaries
    description: Hiding persistence details behind explicit interfaces so services and route handlers do not depend on storage mechanics.
  - id: fastapi-test-depth
    title: FastAPI Testing Depth
    description: Testing dependency overrides, validation paths, error semantics, persistence isolation, and route contracts deliberately.
  - id: py-sqlite-persistence
    title: SQLite Persistence
    description: Using Python's sqlite3 module for durable local storage with schema creation, parameterized queries, and row mapping.
  - id: py-package-structure
    title: Python Package Structure
    description: Organizing FastAPI code into app, models, services, repositories, and dependencies modules with clear ownership.
  - id: py-pagination-filtering
    title: Pagination and Filtering
    description: Designing list endpoints with query validation, deterministic ordering, tag/text filtering, limits, and offsets.
  - id: py-transactions
    title: Transaction Boundaries
    description: Keeping multi-step persistence changes atomic with explicit commit and rollback behavior.
  - id: py-async-boundaries
    title: Async Boundary Discipline
    description: Deciding where async belongs, where sync work must be isolated, and how to keep blocking persistence out of the event loop.
  - id: py-production-api-assembly
    title: Production API Assembly
    description: Combining package structure, dependencies, SQLite persistence, tests, HTTP semantics, and async policy into a coherent API.
  - id: py-settings-configuration
    title: Settings and Configuration
    description: Loading validated application settings from environment-like inputs with safe defaults and explicit production requirements.
  - id: py-observability
    title: Logging and Observability
    description: Emitting structured request logs, request IDs, timings, and safe error telemetry.
  - id: fastapi-api-key-auth
    title: API Key Authentication
    description: Protecting write routes with API keys while preserving public reads and clear 401/403 behavior.
  - id: py-schema-migrations
    title: Schema Migrations
    description: Versioning SQLite schema changes with idempotent migrations and startup checks.
  - id: py-packaging-running
    title: Packaging and Running
    description: Defining app import paths, uvicorn targets, run commands, and production-ish startup checks.
  - id: py-orm-boundaries
    title: ORM Boundaries
    description: Mapping domain records to ORM table models while keeping services independent from SQLAlchemy or SQLModel details.
  - id: py-alembic-migrations
    title: Alembic Migrations
    description: Planning Alembic revisions with upgrade, downgrade, schema-review, and migration-test discipline.
  - id: py-postgres-readiness
    title: PostgreSQL Readiness
    description: Preparing settings, connection strings, portability checks, and tests for moving beyond SQLite assumptions.
  - id: py-sqlalchemy-implementation
    title: SQLAlchemy Implementation
    description: Turning repository contracts into concrete SQLAlchemy models, sessions, row mapping, and transaction ownership.
  - id: py-alembic-environment
    title: Alembic Environment
    description: Wiring Alembic configuration, metadata discovery, revision commands, and migration smoke tests deliberately.
  - id: py-postgres-engine
    title: PostgreSQL Engine Configuration
    description: Configuring PostgreSQL drivers, engine options, session factories, pool settings, and production database guards.
