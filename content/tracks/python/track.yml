          - book: pytest-docs
            chapter: How to write and report assertions in tests
            topic: testing output strings and invalid command data
            usage: QualityAnchor
      - id: py-notes-command-runner
        title: Command runner composition
        summary: Compose the existing note helpers into a real add-command workflow that reads, appends, saves, and reports.
        markdown: tracks/python/projects/py-notes-cli/command-runner-composition.md
        order: 5
