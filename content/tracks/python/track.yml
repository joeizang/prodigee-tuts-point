id: python
title: Python and FastAPI
slug: python
description: Beginner-to-proficient Python and FastAPI through methodical language foundations, pytest, real project workspaces, APIs, persistence, validation, and production design.
language: Python
contentVersion: 2026.06.20
concepts:
  - id: py-names-and-objects
    title: Names and Objects
    description: Understanding Python names as bindings to objects rather than boxes that contain values.
  - id: py-strings
    title: Text as Data
    description: Working with immutable strings, whitespace, casing, and explicit text contracts.
  - id: py-functions
    title: Functions and Return Values
    description: Writing small functions with clear inputs, outputs, exceptions, and type hints.
  - id: py-collections
    title: Lists and Collections
    description: Using lists to hold ordered values, remove empty data, and build deterministic outputs.
  - id: py-validation
    title: Validation Boundaries
    description: Separating outside text from trusted application data with explicit parsing and errors.
  - id: py-file-io
    title: File I/O Boundaries
    description: Reading and writing UTF-8 text with pathlib while keeping file effects outside pure core logic.
  - id: py-json-storage
    title: JSON Storage
    description: Converting Python dictionaries and lists to deterministic JSON and validating loaded records.
  - id: py-cli-boundaries
    title: CLI Command Boundaries
    description: Parsing command arguments and rendering command output without mixing UI concerns into core rules.
  - id: py-command-runner
    title: Command Runner Composition
    description: Composing parsing, validation, storage, and rendering helpers into one testable application workflow.
  - id: py-pytest-basics
    title: pytest Basics
    description: Using assertions and exception tests to turn beginner mental models into executable evidence.
  - id: py-editor-feedback
    title: Editor Feedback
    description: Using Pyright, Ruff, diagnostics, hover, and formatting as part of the learning loop.
  - id: fastapi-request-models
    title: FastAPI Request Models
    description: Future concept for connecting plain Python type hints and validation to FastAPI request bodies.
modules:
  - id: py-notes-foundations
    title: Python Notes Foundations
    description: Build the first pure functions for py-notes-cli while learning Python syntax, strings, functions, tests, and editor feedback from zero.
    order: 1
lessons:
  - id: text-as-data-python
    moduleId: py-notes-foundations
    title: Text as Data in Python
    summary: "Learn Python's first text mental model: names, immutable strings, return values, whitespace contracts, tests, and editor feedback."
    markdown: tracks/python/lessons/text-as-data-python.md
    order: 1
    concepts:
      - py-names-and-objects
      - py-strings
      - py-functions
      - py-pytest-basics
      - py-editor-feedback
    sourceReferences:
      - book: python-official-tutorial
        chapter: An Informal Introduction to Python
        topic: strings, names, lists, and basic expressions
        usage: QualityAnchor
      - book: python-official-tutorial
        chapter: Defining Functions
        topic: function bodies, return values, and arguments
        usage: QualityAnchor
      - book: pytest-docs
        chapter: How to write and report assertions in tests
        topic: plain assert statements and exception checks
        usage: QualityAnchor
  - id: parsing-tags-python
    moduleId: py-notes-foundations
    title: Parsing Tags into Data
    summary: Turn loose tag text into a validated list of normalized tags while learning lists, loops, membership checks, and failure boundaries.
    markdown: tracks/python/lessons/parsing-tags-python.md
    order: 2
    concepts:
      - py-strings
      - py-functions
      - py-collections
      - py-validation
      - py-pytest-basics
      - py-editor-feedback
    sourceReferences:
      - book: python-official-tutorial
        chapter: More on Lists
        topic: list construction, membership checks, and ordered data
        usage: QualityAnchor
      - book: python-official-tutorial
        chapter: Errors and Exceptions
        topic: raising ValueError for invalid input
        usage: QualityAnchor
      - book: pytest-docs
        chapter: How to write and report assertions in tests
        topic: testing returned lists and exception paths
        usage: QualityAnchor
  - id: files-paths-utf8-python
    moduleId: py-notes-foundations
    title: Files, Paths, and UTF-8 Text
    summary: Learn pathlib, explicit UTF-8 file boundaries, and why file effects should wrap tested pure functions.
    markdown: tracks/python/lessons/files-paths-utf8-python.md
    order: 3
    concepts:
      - py-functions
      - py-validation
      - py-file-io
      - py-pytest-basics
      - py-editor-feedback
    sourceReferences:
