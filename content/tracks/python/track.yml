projects:
  - id: py-notes-cli
    title: py-notes-cli
    slug: py-notes-cli
    description: Build a small notes command-line tool while learning Python from first principles through tests, text contracts, JSON storage, and deterministic output.
    milestones:
      - id: py-notes-title-normalization
        title: Title normalization
        summary: Define and implement the first Python text boundary for reusable note-title handling.
        markdown: tracks/python/projects/py-notes-cli/title-normalization.md
        order: 1
        lessons:
          - text-as-data-python
        exercises:
          - normalize-note-title-py
        sourceReferences:
          - book: python-official-tutorial
            chapter: An Informal Introduction to Python
            topic: strings and lists
            usage: QualityAnchor
          - book: pytest-docs
            chapter: Getting started
            topic: assertions and exception tests
            usage: QualityAnchor
      - id: py-notes-tag-parsing
        title: Tag parsing
        summary: Convert loose user tag text into validated application data for later search and API filters.
        markdown: tracks/python/projects/py-notes-cli/tag-parsing.md
        order: 2
        lessons:
          - parsing-tags-python
        exercises:
          - parse-note-tags-py
        sourceReferences:
          - book: python-official-tutorial
            chapter: More on Lists
            topic: list construction and membership checks
            usage: QualityAnchor
          - book: python-official-tutorial
            chapter: Errors and Exceptions
            topic: explicit invalid-input failures
            usage: QualityAnchor
          - book: pytest-docs
            chapter: How to write and report assertions in tests
            topic: returned collection assertions and pytest.raises
            usage: QualityAnchor
      - id: py-notes-storage-boundary
        title: Note storage
        summary: Convert trusted note fields into JSON records and load UTF-8 JSON files through a validation boundary.
        markdown: tracks/python/projects/py-notes-cli/note-storage.md
        order: 3
        lessons:
          - files-paths-utf8-python
          - json-storage-python
        exercises:
          - serialize-note-record-py
          - load-notes-file-py
        sourceReferences:
          - book: python-standard-library
            chapter: pathlib
            topic: Path objects and text reads
            usage: QualityAnchor
          - book: python-standard-library
            chapter: json
            topic: JSON encoding, decoding, and deterministic formatting
            usage: QualityAnchor
          - book: pytest-docs
            chapter: How to use temporary directories and files in tests
            topic: tmp_path for isolated storage tests
            usage: QualityAnchor
      - id: py-notes-cli-boundary
