id: csharp
title: C# Language
slug: csharp
description: Project-backed mastery of modern C# through CLI, testing, data structures, APIs, persistence, concurrency, and production design.
language: CSharp
contentVersion: 2026.06.13
concepts:
  - id: csharp-strings
    title: Text as Data
    description: Understanding strings, chars, immutability, indexing, and practical text boundaries in C#.
  - id: csharp-tokenization
    title: Normalization and Tokenization
    description: Turning raw text into stable tokens with explicit rules and documented limitations.
  - id: csharp-dictionaries
    title: Dictionaries and Frequency Maps
    description: Using hash maps to model counts, lookups, and updates clearly.
  - id: csharp-ordering
    title: Deterministic Ordering
    description: Producing stable sorted output that is easy to test and reason about.
  - id: csharp-xunit
    title: Testing Pure Functions
    description: Designing small tests around deterministic behavior and edge cases.
  - id: csharp-api-design
    title: Small Core API Design
    description: Naming and shaping a small reusable core before adding CLI or file I/O.
  - id: csharp-cli-contracts
    title: CLI Contracts
    description: Designing command-line behavior with explicit arguments, stdin, output, and exit-code rules.
  - id: csharp-file-io
    title: File Input and I/O Boundaries
    description: Reading text from files and stdin while keeping side effects outside the analyzer core.
  - id: csharp-error-handling
    title: User-Facing Error Handling
    description: Returning meaningful failures, deterministic messages, and useful exit codes without hiding defects.
modules:
  - id: csharp-wordfreq-core
    title: Word Frequency Core
    description: Build the pure text-analysis core for the wordfreq-csharp project.
    order: 1
  - id: csharp-wordfreq-cli
    title: Word Frequency CLI
    description: Wrap the pure analyzer with command-line input, file I/O, formatted output, and error handling.
    order: 2
lessons:
  - id: text-as-data-csharp
    moduleId: csharp-wordfreq-core
    title: Text as Data in C#
    summary: Learn the practical model of string, char, immutability, indexing, and why Unicode is a deliberate later extension.
    markdown: tracks/csharp/lessons/text-as-data-csharp.md
    order: 1
    concepts:
      - csharp-strings
    sourceReferences:
      - book: csharp-12-in-a-nutshell
        chapter: Strings and Characters
        topic: string, char, immutability, indexing
        usage: QualityAnchor
  - id: normalization-and-tokenization
    moduleId: csharp-wordfreq-core
    title: Normalization and Tokenization
    summary: Define the ASCII-first rule that turns raw input into stable words.
    markdown: tracks/csharp/lessons/normalization-and-tokenization.md
    order: 2
    concepts:
      - csharp-strings
      - csharp-tokenization
    sourceReferences:
      - book: programming-csharp-12
        chapter: Text Processing
        topic: normalization, character classification, explicit parsing rules
        usage: QualityAnchor
  - id: dictionaries-as-frequency-maps
    moduleId: csharp-wordfreq-core
    title: Dictionaries as Frequency Maps
    summary: Use Dictionary<string, int> as the core model for word frequency counting.
    markdown: tracks/csharp/lessons/dictionaries-as-frequency-maps.md
    order: 3
    concepts:
      - csharp-dictionaries
    sourceReferences:
      - book: csharp-12-in-a-nutshell
        chapter: Collections
        topic: Dictionary<TKey,TValue>, lookup and update patterns
        usage: QualityAnchor
  - id: deterministic-ordering
    moduleId: csharp-wordfreq-core
    title: Deterministic Ordering
    summary: Sort frequency results by count descending and word ascending so output is stable and testable.
    markdown: tracks/csharp/lessons/deterministic-ordering.md
    order: 4
    concepts:
      - csharp-ordering
    sourceReferences:
      - book: programming-csharp-12
        chapter: LINQ and Ordering
        topic: ordering, tie-breakers, deterministic output
        usage: QualityAnchor
  - id: testing-pure-functions-xunit
    moduleId: csharp-wordfreq-core
    title: Testing Pure Functions with xUnit
    summary: Build confidence with focused tests before the CLI and file-system concerns arrive.
    markdown: tracks/csharp/lessons/testing-pure-functions-xunit.md
    order: 5
    concepts:
      - csharp-xunit
    sourceReferences:
      - book: code-that-fits-in-your-head
        chapter: Checklists and Testing
        topic: small tests, readable feedback, maintainable code
        usage: QualityAnchor
  - id: designing-small-core-api
    moduleId: csharp-wordfreq-core
    title: Designing a Small Core API
    summary: Shape the WordFrequencyAnalyzer API so later CLI, file, and streaming milestones can build on it.
    markdown: tracks/csharp/lessons/designing-small-core-api.md
    order: 6
    concepts:
      - csharp-api-design
    sourceReferences:
      - book: code-that-fits-in-your-head
        chapter: API Design
        topic: small surface area, names, maintainability
        usage: QualityAnchor
  - id: cli-contracts-and-exit-codes
    moduleId: csharp-wordfreq-cli
    title: CLI Contracts and Exit Codes
    summary: Define how a command-line tool receives input, reports success, and communicates failure.
    markdown: tracks/csharp/lessons/cli-contracts-and-exit-codes.md
    order: 7
    concepts:
      - csharp-cli-contracts
      - csharp-error-handling
    sourceReferences:
      - book: code-that-fits-in-your-head
        chapter: Error Handling and Contracts
        topic: command boundaries, clear failures, maintainable interfaces
        usage: QualityAnchor
  - id: file-input-boundaries
    moduleId: csharp-wordfreq-cli
    title: File Input Boundaries
    summary: Read text from files and stdin without contaminating the pure analyzer core.
    markdown: tracks/csharp/lessons/file-input-boundaries.md
    order: 8
    concepts:
      - csharp-file-io
      - csharp-api-design
    sourceReferences:
      - book: programming-csharp-12
        chapter: Streams and Files
        topic: file reads, stdin, I/O boundary design
        usage: QualityAnchor
  - id: formatting-cli-output
    moduleId: csharp-wordfreq-cli
    title: Formatting CLI Output
    summary: Turn analyzer results into deterministic, user-readable command output.
    markdown: tracks/csharp/lessons/formatting-cli-output.md
    order: 9
    concepts:
      - csharp-cli-contracts
      - csharp-ordering
    sourceReferences:
      - book: csharp-12-in-a-nutshell
        chapter: Formatting and Text
        topic: string formatting, joining lines, deterministic text output
        usage: QualityAnchor
exercises:
