projects:
  - id: wordfreq-csharp
    title: wordfreq-csharp
    slug: wordfreq-csharp
    description: Build a C# word frequency tool through a hybrid ramp from pure functions to CLI, file I/O, output formats, and streaming.
    milestones:
      - id: pure-word-counting-core
        title: Pure Word Counting Core
        summary: Implement the reusable analyzer core before adding CLI or file-system behavior.
        markdown: tracks/csharp/projects/wordfreq/milestones/pure-word-counting-core.md
        order: 1
        lessons:
          - text-as-data-csharp
          - normalization-and-tokenization
          - dictionaries-as-frequency-maps
          - deterministic-ordering
          - testing-pure-functions-xunit
          - designing-small-core-api
        exercises:
          - normalize-to-lowercase
          - keep-ascii-letters-and-digits
          - split-words-on-separators
          - tokenize-simple-sentence
          - tokenize-with-punctuation
          - count-words-with-dictionary
          - update-frequency-map-safely
          - sort-frequencies-deterministically
          - handle-empty-and-whitespace-input
          - build-word-frequency-analyzer
        sourceReferences:
          - book: csharp-players-guide-5
            chapter: Methods and Collections
            topic: small methods, collection practice, exercise-driven learning
            usage: QualityAnchor
      - id: cli-and-file-io
        title: CLI and File I/O
        summary: Wrap the pure analyzer with argument parsing, input reading, deterministic output, and user-facing failures.
        markdown: tracks/csharp/projects/wordfreq/milestones/cli-and-file-io.md
        order: 2
        lessons:
          - cli-contracts-and-exit-codes
          - file-input-boundaries
          - formatting-cli-output
        exercises:
          - parse-wordfreq-cli-options
          - read-wordfreq-input-file
          - handle-missing-input-file
          - format-wordfreq-table
          - run-wordfreq-cli-request
        sourceReferences:
          - book: code-that-fits-in-your-head
            chapter: Boundaries and Errors
            topic: CLI contract, side-effect boundaries, failure messages
            usage: QualityAnchor
      - id: streaming-and-scale
        title: Streaming and Scale
        summary: Make the word-frequency tool handle larger inputs with line streaming, explicit aggregation, and top-N output.
        markdown: tracks/csharp/projects/wordfreq/milestones/streaming-and-scale.md
        order: 3
        lessons:
          - streaming-large-text-input
          - merging-frequency-maps
          - performance-bounds-and-top-n
        exercises:
          - stream-wordfreq-lines
