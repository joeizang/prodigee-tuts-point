    order: 1
    concepts:
      - csharp-strings
  - id: keep-ascii-letters-and-digits
    title: KeepAsciiLettersAndDigits
    summary: Preserve ASCII letters and digits while treating other characters as separators.
    directory: tracks/csharp/exercises/keep-ascii-letters-and-digits
    order: 2
    concepts:
      - csharp-tokenization
  - id: split-words-on-separators
    title: SplitWordsOnSeparators
    summary: Split normalized text into candidate words without producing empty tokens.
    directory: tracks/csharp/exercises/split-words-on-separators
