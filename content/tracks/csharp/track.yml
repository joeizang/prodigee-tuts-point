id: csharp
title: C# Language
slug: csharp
description: Project-backed mastery of modern C# through CLI, testing, data structures, APIs, persistence, concurrency, and production design.
language: CSharp
contentVersion: 2026.06.13
concepts:
  - id: csharp-strings
    title: Text as Data
    description: Understanding strings, chars, immutability, indexing, and practical text boundaries in C#.
  - id: csharp-tokenization
    title: Normalization and Tokenization
    description: Turning raw text into stable tokens with explicit rules and documented limitations.
  - id: csharp-dictionaries
    title: Dictionaries and Frequency Maps
    description: Using hash maps to model counts, lookups, and updates clearly.
  - id: csharp-ordering
    title: Deterministic Ordering
    description: Producing stable sorted output that is easy to test and reason about.
  - id: csharp-xunit
    title: Testing Pure Functions
    description: Designing small tests around deterministic behavior and edge cases.
  - id: csharp-api-design
    title: Small Core API Design
    description: Naming and shaping a small reusable core before adding CLI or file I/O.
  - id: csharp-cli-contracts
    title: CLI Contracts
    description: Designing command-line behavior with explicit arguments, stdin, output, and exit-code rules.
  - id: csharp-file-io
    title: File Input and I/O Boundaries
    description: Reading text from files and stdin while keeping side effects outside the analyzer core.
  - id: csharp-error-handling
    title: User-Facing Error Handling
    description: Returning meaningful failures, deterministic messages, and useful exit codes without hiding defects.
  - id: csharp-streaming
    title: Streaming and Incremental Processing
    description: Processing large inputs line by line without loading the whole dataset into memory.
  - id: csharp-performance
    title: Performance Boundaries
    description: Measuring allocation, memory, and algorithmic pressure before changing design.
  - id: csharp-log-parsing
    title: Log Parsing
    description: Turning semi-structured log lines into explicit records with predictable failure behavior.
  - id: csharp-query-pipeline
    title: Query Pipelines
    description: Filtering, projecting, grouping, and summarizing records with readable pipeline stages.
  - id: csharp-observability
    title: Operational Diagnostics
    description: Modeling errors and summaries so tools help engineers investigate systems quickly.
modules:
  - id: csharp-wordfreq-core
    title: Word Frequency Core
    description: Build the pure text-analysis core for the wordfreq-csharp project.
    order: 1
  - id: csharp-wordfreq-cli
    title: Word Frequency CLI
    description: Wrap the pure analyzer with command-line input, file I/O, formatted output, and error handling.
    order: 2
  - id: csharp-wordfreq-streaming
    title: Word Frequency Streaming
    description: Make the analyzer scale to larger files through line streaming, map merging, and top-N output.
    order: 3
  - id: csharp-logquery-core
    title: Log Query Core
    description: Build the core parser and query engine for a production-style log investigation CLI.
    order: 4
lessons:
  - id: text-as-data-csharp
    moduleId: csharp-wordfreq-core
    title: Text as Data in C#
    summary: Learn the practical model of string, char, immutability, indexing, and why Unicode is a deliberate later extension.
    markdown: tracks/csharp/lessons/text-as-data-csharp.md
    order: 1
    concepts:
      - csharp-strings
    sourceReferences:
      - book: csharp-12-in-a-nutshell
        chapter: Strings and Characters
        topic: string, char, immutability, indexing
        usage: QualityAnchor
  - id: normalization-and-tokenization
    moduleId: csharp-wordfreq-core
    title: Normalization and Tokenization
    summary: Define the ASCII-first rule that turns raw input into stable words.
    markdown: tracks/csharp/lessons/normalization-and-tokenization.md
    order: 2
    concepts:
      - csharp-strings
      - csharp-tokenization
    sourceReferences:
      - book: programming-csharp-12
        chapter: Text Processing
        topic: normalization, character classification, explicit parsing rules
        usage: QualityAnchor
  - id: dictionaries-as-frequency-maps
    moduleId: csharp-wordfreq-core
