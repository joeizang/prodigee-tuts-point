id: sort-frequencies-deterministically
title: SortFrequenciesDeterministically
kind: focused
workspace:
  starter: tracks/csharp/exercises/_shared/WordFrequencyAnalyzer.cs
  visibleTest: |
    Assert.Equal(["alpha", "beta"], WordFrequencyAnalyzer.SortFrequencies(new() { ["beta"] = 1, ["alpha"] = 1 }).Select(item => item.Word));
